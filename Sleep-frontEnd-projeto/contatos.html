<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contato</title>

    <style>
        body {
            background: linear-gradient(to bottom, #1a1a1a, #3b2f2f);
            color: #f5f5f5;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px;
            text-align: center;
        }

        h1 {
            font-size: 45px;
            color: #e0b084;
        }

        p {
            font-size: 18px;
        }

        .container {
            background-color: rgba(0,0,0,0.6);
            padding: 30px;
            border-radius: 15px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #e0b084;
            color: black;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        a:hover {
            background-color: #ffffff;
        }

        .link-site {
            color: #000000;
            text-decoration: none;
        }

        .link-site:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Contato</h1>

        <p>Quer saber mais sobre a banda?</p>

        <p>
            <strong>Site oficial:</strong><br>
            <a class="link-site" href="https://www.sleep-token.com/live/" target="_blank">
                https://www.sleep-token.com/live/
            </a>
        </p>

        <a href="index.html">Voltar para a página inicial</a>
    </div>
</body>
</html>
